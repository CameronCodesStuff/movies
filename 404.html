<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — LUMIS</title>
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    .not-found {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: var(--black);
      position: relative;
      overflow: hidden;
    }

    .not-found::before {
      content: '404';
      position: absolute;
      font-family: var(--font-caps);
      font-size: clamp(140px, 30vw, 280px);
      color: rgba(201,168,76,0.04);
      letter-spacing: -0.05em;
      pointer-events: none;
      user-select: none;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }

    .not-found-logo {
      height: 80px;
      width: auto;
      margin-bottom: 32px;
      filter: drop-shadow(0 0 20px rgba(201,168,76,0.4));
    }

    .not-found-code {
      font-family: var(--font-caps);
      font-size: 14px;
      letter-spacing: 0.3em;
      color: var(--gold);
      margin-bottom: 16px;
      position: relative;
    }

    .not-found-title {
      font-family: var(--font-display);
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.05;
      margin-bottom: 16px;
      position: relative;
    }

    .not-found-title em {
      font-style: italic;
      color: var(--gold-light);
    }

    .not-found-sub {
      font-size: 16px;
      color: var(--grey);
      max-width: 380px;
      line-height: 1.7;
      margin-bottom: 40px;
      position: relative;
    }

    .not-found-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
    }

    .not-found-countdown {
      margin-top: 28px;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      position: relative;
    }

    .not-found-countdown span {
      color: var(--gold);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="not-found">
    <img src="images/logo.png" alt="LUMIS" class="not-found-logo" onerror="this.style.display='none'" />
    <div class="not-found-code">ERROR 404</div>
    <h1 class="not-found-title">Scene <em>Not Found</em></h1>
    <p class="not-found-sub">The page you're looking for has left the building. Maybe it was cut from the final edit.</p>
    <div class="not-found-actions">
      <a href="index.html" class="btn-primary" style="display:inline-flex;align-items:center;gap:10px;text-decoration:none">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        Back to Home
      </a>
      <a href="catalogue.html" class="btn-secondary" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none">
        Browse Catalogue
      </a>
    </div>
    <div class="not-found-countdown">Redirecting in <span id="countdown">5</span>s…</div>
  </div>

  <script>
    let t = 5;
    const el = document.getElementById('countdown');
    const iv = setInterval(() => {
      t--;
      if (el) el.textContent = t;
      if (t <= 0) { clearInterval(iv); window.location.replace('index.html'); }
    }, 1000);
  </script>
</body>
</html>
